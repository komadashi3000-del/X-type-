<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X-TYPE 診断テスト</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>X-TYPE 診断テスト</h1>
        <p class="lead">100問に答えて、あなたの X-TYPE コードを診断します。</p>
      </header>

      <section id="start-screen" class="panel">
        <h2>はじめに</h2>
        <p>
          5つのセクション（合計100問）に回答すると、
          <strong>フルコード・正式名称・軸スコア</strong>を表示します。
        </p>
        <ul>
          <li>回答は自動で保存され、途中再開できます。</li>
          <li>各セクションは全問回答で次へ進めます。</li>
          <li>選択肢は6段階（はい〜いいえ）です。</li>
        </ul>
        <button id="start-btn" class="btn primary">診断を開始する</button>
      </section>

      <section id="quiz-screen" class="panel hidden" aria-live="polite">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="section-title"></span>
            <span id="progress-text"></span>
          </div>
          <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>

        <h2 id="quiz-title"></h2>
        <p id="quiz-description" class="section-description"></p>

        <form id="questions-form" class="questions"></form>

        <div class="nav-buttons">
          <button id="prev-btn" type="button" class="btn">戻る</button>
          <button id="next-btn" type="button" class="btn primary">次へ</button>
        </div>
      </section>

      <section id="result-screen" class="panel hidden">
        <h2>診断結果</h2>
        <div class="result-card">
          <p><strong>あなたのX-TYPEコード:</strong> <span id="full-code"></span></p>
          <p><strong>ベースコード:</strong> <span id="base-code"></span></p>
          <p><strong>正式名称:</strong> <span id="official-name"></span></p>
        </div>

        <h3>各軸スコア</h3>
        <ul id="score-list" class="score-list"></ul>

        <h3>要約</h3>
        <p id="summary-text" class="summary"></p>

        <div class="result-actions">
          <button id="retry-btn" class="btn primary" type="button">もう一度やる</button>
          <button id="reset-btn" class="btn danger" type="button">回答データを初期化する</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
